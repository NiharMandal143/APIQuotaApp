<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>View Packs</title>
</head>

<body>

<h1>Available Packs</h1>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Pack Name</th>
        <th>Price</th>
        <th>API Limit</th>
        <th>Action</th>
        <!-- Only admin sees this -->
        <th th:if="${isAdmin}">Admin Actions</th>
    </tr>

    <tr th:each="pack : ${packs}">

        <td th:text="${pack.id}"></td>

        <td th:text="${pack.packName}"></td>

        <td th:text="${pack.price}"></td>

        <td th:text="${pack.apiLimit}"></td>
        <td>

            <a th:href="@{/buy-pack/{id}(id=${pack.id})}">
                Buy
            </a>

        </td>
        <!-- Only admin can edit -->
        <td th:if="${isAdmin}">
            <a th:href="@{/packs/edit/{id}(id=${pack.id})}">
                Edit
            </a>

            <a th:href="@{/packs/delete/{id}(id=${pack.id})}">
                Delete
            </a>
        </td>

    </tr>

</table>

</body>

</html>
